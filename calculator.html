<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <script defer src="calculator.js"></script>
  <style>
    :root {
      --bg: #080c18;
      --panel: rgba(255,255,255,0.06);
      --panel-strong: rgba(255,255,255,0.1);
      --text: #eef2ff;
      --muted: #a0afcc;
      --accent: #5b8dff;
      --accent-strong: #3f6cff;
      --danger: #ff6b6b;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 24px 55px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, rgba(91,141,255,0.16), transparent 18%),
                  linear-gradient(180deg, #09101f 0%, #06101b 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(100%, 760px);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      padding: 32px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2rem, 2.4vw, 2.8rem);
      line-height: 1.05;
    }

    .header p {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 46ch;
      line-height: 1.75;
    }

    .header a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      text-decoration: none;
      transition: transform 180ms ease;
    }

    .header a:hover { transform: translateY(-1px); }

    .calculator {
      padding: 0 32px 32px;
      display: grid;
      gap: 20px;
    }

    .display-panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 24px;
      display: grid;
      gap: 10px;
      min-height: 140px;
    }

    .expression {
      font-size: 1.05rem;
      color: var(--muted);
      word-break: break-all;
      min-height: 28px;
    }

    .result {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text);
      min-height: 1.2em;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .btn {
      border: none;
      border-radius: 18px;
      padding: 20px 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.06); }
    .btn-action { background: var(--accent); }
    .btn-action:hover { background: var(--accent-strong); }
    .btn-danger { background: var(--danger); }
    .btn-wide { grid-column: span 2; }

    @media (max-width: 640px) {
      .page { width: 100%; border-radius: 24px; }
      .header { flex-direction: column; padding: 24px; }
      .calculator { padding: 0 24px 24px; }
      .buttons { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .btn-wide { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header">
      <div>
        <h1>Scientific Calculator</h1>
        <p>Perform standard and scientific operations in a sleek mobile-friendly calculator interface.</p>
      </div>
      <a href="Main.html">Back to Main</a>
    </section>

    <section class="calculator">
      <div class="display-panel">
        <div class="expression" id="expressionDisplay">0</div>
        <div class="result" id="resultDisplay">0</div>
      </div>

      <div class="buttons">
        <button class="btn btn-secondary" data-value="clear">AC</button>
        <button class="btn btn-secondary" data-value="back">←</button>
        <button class="btn btn-secondary" data-value="(">(</button>
        <button class="btn btn-secondary" data-value=")">)</button>
        <button class="btn btn-danger" data-value="/">÷</button>

        <button class="btn btn-secondary" data-value="sin(">sin</button>
        <button class="btn btn-secondary" data-value="cos(">cos</button>
        <button class="btn btn-secondary" data-value="tan(">tan</button>
        <button class="btn btn-secondary" data-value="sqrt(">√</button>
        <button class="btn btn-danger" data-value="*">×</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn btn-secondary" data-value="^">^</button>
        <button class="btn btn-danger" data-value="-">−</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn btn-secondary" data-value="ln(">ln</button>
        <button class="btn btn-danger" data-value="+">+</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn btn-secondary" data-value="log(">log</button>
        <button class="btn btn-action btn-wide" data-value="=">=</button>

        <button class="btn" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn btn-secondary" data-value="pi">π</button>
        <button class="btn btn-secondary" data-value="e">e</button>
      </div>
    </section>
  </main>
</body>
</html>
