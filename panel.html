<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel</title>
  <script defer src="sidePan.js"></script>
  <style>
    :root {
      --bg: #08101f;
      --card: rgba(255,255,255,0.08);
      --card-strong: rgba(255,255,255,0.12);
      --text: #f8fbff;
      --muted: #9db3cc;
      --accent: #45b0ff;
      --accent-strong: #2d99ff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 24px 48px rgba(0,0,0,0.24);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #09121f 0%, #061020 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;\n    }

    .panel {
      width: min(100%, 900px);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      padding: 32px;
      align-items: center;
    }

    .hero h1 { margin: 0; font-size: clamp(2rem, 2.6vw, 3.2rem); }
    .hero p { margin: 16px 0 0; color: var(--muted); line-height: 1.8; }

    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; }

    .button,
    .secondary {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 180ms ease, background-color 180ms ease;
    }

    .button {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .content {
      display: grid;
      gap: 20px;
      padding: 0 32px 32px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card strong { color: white; }
    .card p { margin: 0; color: var(--muted); }

    .toggle-area {
      display: grid;
      gap: 12px;
    }

    #panelText {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e6f0ff;
      min-height: 76px;
      display: flex;
      align-items: center;
    }

    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer {
      padding: 18px 32px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 720px) {
      .hero { grid-template-columns: 1fr; }
      .footer { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="hero">
      <div>
        <h1>Control panel</h1>
        <p>Use this interactive panel to toggle content, update the message, and keep the mobile app feeling fresh.</p>
        <div class="hero-actions">
          <button class="button" id="toggleButton">Hide panel text</button>
          <button class="secondary" id="themeButton">Change text style</button>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="card toggle-area">
        <strong>Status</strong>
        <p id="panelText">Panel content is visible.</p>
      </div>

      <div class="card">
        <strong>Live update</strong>
        <p id="quoteText">Click the button to reveal a helpful panel hint.</p>
        <div class="actions-row">
          <button class="secondary" id="quoteButton">Random hint</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>Interactive panel ready.</span>
      <a href="Main.html">Back to Main</a>
    </div>
  </section>
</body>
</html>
